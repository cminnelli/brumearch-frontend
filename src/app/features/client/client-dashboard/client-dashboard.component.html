<div class="cd">

  <!-- Header -->
  <header class="cd-header">
    <div class="cd-header__brand">
      <img src="/assets/logo brume vector2.png" alt="Brumelab" class="cd-header__logo" />
    </div>
    <div class="cd-header__user">
      <span class="cd-header__name">{{ auth.currentUser()?.name }}</span>
      <button class="cd-header__logout" (click)="logout()">Salir</button>
    </div>
  </header>

  <main class="cd-main">

    <div class="cd-title">
      <h1 class="cd-title__h">Mis proyectos</h1>
      <p class="cd-title__sub">Seguimiento de obra</p>
    </div>

    @if (loading()) {
      <div class="cd-loading">
        <div class="cd-spinner"></div>
      </div>
    } @else if (error()) {
      <p class="cd-error">{{ error() }}</p>
    } @else if (!projects().length) {
      <div class="cd-empty">
        <span class="cd-empty__icon">🏗️</span>
        <p>No hay proyectos asignados todavía.</p>
      </div>
    } @else {
      <div class="cd-grid">
        @for (p of projects(); track p._id) {
          <button class="cd-card" (click)="openProject(p._id)">

            @if (p.coverImage) {
              <div class="cd-card__cover" [style.backgroundImage]="'url(' + p.coverImage + ')'"></div>
            } @else {
              <div class="cd-card__cover cd-card__cover--empty">
                <span>🏛️</span>
              </div>
            }

            <div class="cd-card__body">
              <div class="cd-card__top">
                <h2 class="cd-card__name">{{ p.name }}</h2>
                <span class="cd-card__status cd-card__status--{{ p.status }}">
                  {{ STATUS_LABELS[p.status] }}
                </span>
              </div>

              @if (locationStr(p)) {
                <p class="cd-card__loc">📍 {{ locationStr(p) }}</p>
              }

              @if (p.description) {
                <p class="cd-card__desc">{{ p.description }}</p>
              }

              <!-- Progreso de etapas -->
              @if (p.etapas?.length) {
                <div class="cd-card__progress">
                  <div class="cd-card__progress-bar">
                    <div class="cd-card__progress-fill" [style.width.%]="etapaProgress(p)"></div>
                  </div>
                  <div class="cd-card__progress-meta">
                    <span>{{ etapaProgress(p) }}% completado</span>
                    @if (activeEtapa(p)) {
                      <span class="cd-card__etapa">{{ activeEtapa(p) }}</span>
                    }
                  </div>
                </div>
              }

              <!-- Servicios -->
              @if (p.services?.length) {
                <div class="cd-card__tags">
                  @for (s of p.services.slice(0, 3); track s) {
                    <span class="cd-card__tag">{{ SERVICE_LABELS[s] ?? s }}</span>
                  }
                  @if (p.services.length > 3) {
                    <span class="cd-card__tag cd-card__tag--more">+{{ p.services.length - 3 }}</span>
                  }
                </div>
              }
            </div>

          </button>
        }
      </div>
    }

  </main>
</div>
