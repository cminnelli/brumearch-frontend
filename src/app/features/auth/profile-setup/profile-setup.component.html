<div class="setup-page">
  <div class="setup-card">
    <div class="setup-card__brand">
      <div class="brand-mark"></div>
      <span>Brumelab Arch</span>
    </div>

    <div class="setup-header">
      <h1>Un último paso</h1>
      <p class="subtitle">Confirmá tu nombre antes de continuar</p>
    </div>

    @if (error()) {
      <div class="alert">{{ error() }}</div>
    }

    <form (ngSubmit)="submit()">
      <div class="field">
        <label>Nombre completo <span class="req">*</span></label>
        <input type="text" [(ngModel)]="name" name="name" placeholder="Juan Pérez" required />
      </div>
      <div class="field">
        <label>Teléfono</label>
        <input type="tel" [(ngModel)]="telefono" name="telefono" placeholder="+54 11 0000-0000" />
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading()">
        @if (loading()) { Guardando... } @else { Continuar }
      </button>
    </form>
  </div>
</div>
